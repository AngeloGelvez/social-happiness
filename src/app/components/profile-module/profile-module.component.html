@if(userActive) {
    <div class="flex flex-col gap-2">
        <div class="background-feed-profile rounded-xl pr-46 pt-24">
            <img class="rounded-full bg-gray-100 p-1" [src]="userActive.image" width="75px"
                alt="imagen de perfil usuario">
        </div>

        <div class="flex flex-col gap-8 justify-between">
            <div class="px-3">
                <h2 class="font-semibold!">{{ userActive.firstName + " " + userActive.lastName }}</h2>
                <p class="text-gray-500">{{ "@" + userActive.username }}</p>
            </div>

            <div class="flex flex-col justify-between gap-8 pb-3 h-[380px]">
                <div class="flex flex-col gap-2">
                    <li class="list-none bg-gray-900 text-white rounded-xs px-3 py-1"><a class="w-full" href="#">Mi feed</a></li>
                    <li class="list-none px-3 py-1"><a class="w-full" href="#">Descubrir</a></li>
                    <li class="list-none px-3 py-1"><a class="w-full" href="#">Mis publicaciones</a></li>
                    <li class="list-none px-3 py-1"><a class="w-full" href="#">Mis comentarios</a></li>
                </div>

                <div class="flex flex-col gap-2">
                    <li class="list-none px-3 py-1"><a class="w-full" href="#">Mi Perfíl</a></li>
                    <li class="list-none px-3 py-1 text-(--alert-color)"><a class="w-full" href="#">Cerrar sesión</a>
                    </li>
                </div>
            </div>
        </div>
    </div>
}@else {
    <div class="flex flex-col gap-2 animate-pulse">
    
        <div class="bg-gray-200 rounded-xl pr-46 pt-24">
            <div class="rounded-full bg-gray-300 w-[75px] h-[75px] ml-4 -mb-4"></div>
        </div>

        <div class="flex flex-col gap-8 justify-between mt-4">
            
            <div class="px-3 flex flex-col gap-3">
                <div class="h-5 bg-gray-300 rounded-md w-3/4"></div>
                <div class="h-4 bg-gray-200 rounded-md w-1/2"></div>
            </div>

            <div class="flex flex-col justify-between gap-8 h-[340px]">
                
                <div class="flex flex-col gap-4 px-3">
                    <div class="h-8 bg-gray-300 rounded-xl w-full"></div>
                    <div class="h-8 bg-gray-200 rounded-xl w-11/12"></div>
                    <div class="h-8 bg-gray-200 rounded-xl w-full"></div>
                    <div class="h-8 bg-gray-200 rounded-xl w-10/12"></div>
                </div>

                <div class="flex flex-col gap-4 px-3">
                    <div class="h-8 bg-gray-200 rounded-xl w-full"></div>
                    <div class="h-8 bg-gray-200 rounded-xl w-11/12"></div>
                </div>
                
            </div>
        </div>
    </div>
}
