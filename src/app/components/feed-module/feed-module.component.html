<div class="w-auto flex flex-col gap-6" (window:scroll)="onWindowScroll($event)">
    <div class="flex justify-between items-center bg-stone-100 px-4 py-3 rounded-lg">
        <h1 class="text-xl">¿Qué está pasando?</h1>
        <div class="flex gap-4 text-sm">
            <button class="bg-white px-2 py-1 rounded-xl">Reciente</button>
            <button>Popular</button>
            <button>Amigos</button>
        </div>
    </div>

    @if(!loader && postListWithUser) {
        @for(post of postListWithUser; track $index) {
            <app-post-module [title]="post.title" [body]="post.body" [likes]="post.reactions.likes"
                [dislikes]="post.reactions.dislikes" [tags]="post.tags" [views]="post.views"
                [user]="post.userModel"></app-post-module>
        }
    }@else {
        <div class="bg-gray-100 p-4 rounded-lg flex flex-col gap-3 animate-pulse">

            <div class="flex justify-between items-center">
                <div class="rounded-lg bg-gray-300 h-10 w-10"></div>

                <div class="h-4 bg-gray-300 rounded w-16"></div>
            </div>

            <div class="flex flex-col gap-3">

                <div class="flex flex-col gap-2">
                    <div class="h-5 bg-gray-300 rounded w-3/4 mb-1"></div>

                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-11/12"></div>
                    <div class="h-4 bg-gray-200 rounded w-4/5"></div>
                </div>

                <div class="flex gap-3">
                    <div class="h-4 bg-gray-200 rounded w-12"></div>
                    <div class="h-4 bg-gray-200 rounded w-16"></div>
                    <div class="h-4 bg-gray-200 rounded w-14"></div>
                </div>

                <div class="flex gap-3 items-center justify-end mt-1">

                    <div class="flex gap-2 items-center">
                        <div class="h-5 w-5 bg-gray-300 rounded-md"></div>
                        <div class="h-4 bg-gray-300 rounded w-8"></div>
                    </div>

                    <div class="flex gap-2 items-center">
                        <div class="h-5 w-5 bg-gray-300 rounded-md"></div>
                        <div class="h-4 bg-gray-300 rounded w-8"></div>
                    </div>

                </div>
            </div>
        </div>

        <div class="bg-gray-100 p-4 rounded-lg flex flex-col gap-3 animate-pulse">

            <div class="flex justify-between items-center">
                <div class="rounded-lg bg-gray-300 h-10 w-10"></div>

                <div class="h-4 bg-gray-300 rounded w-16"></div>
            </div>

            <div class="flex flex-col gap-3">

                <div class="flex flex-col gap-2">
                    <div class="h-5 bg-gray-300 rounded w-3/4 mb-1"></div>

                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-11/12"></div>
                    <div class="h-4 bg-gray-200 rounded w-4/5"></div>
                </div>

                <div class="flex gap-3">
                    <div class="h-4 bg-gray-200 rounded w-12"></div>
                    <div class="h-4 bg-gray-200 rounded w-16"></div>
                    <div class="h-4 bg-gray-200 rounded w-14"></div>
                </div>

                <div class="flex gap-3 items-center justify-end mt-1">

                    <div class="flex gap-2 items-center">
                        <div class="h-5 w-5 bg-gray-300 rounded-md"></div>
                        <div class="h-4 bg-gray-300 rounded w-8"></div>
                    </div>

                    <div class="flex gap-2 items-center">
                        <div class="h-5 w-5 bg-gray-300 rounded-md"></div>

                    </div>

                </div>
            </div>
        </div>

                <div class="h-4 bg-gray-300 rounded w-16"></div>

            <div class="flex flex-col gap-3">

                    </div>

                    <div class="h-4 bg-gray-200 rounded w-full"></div>

                        <div class="h-5 w-5 bg-gray-300 rounded-md"></div>
                        <div class="h-4 bg-gray-300 rounded w-8"></div>
                    </div>

                    <div class="flex gap-2 items-center">
                        <div class="h-5 w-5 bg-gray-300 rounded-md"></div>
                        <div class="h-4 bg-gray-300 rounded w-8"></div>
                    </div>

                </div>
            </div>
        </div>
    }

    @if(loaderMorePost) {
        <div class="text-center flex flex-col gap-2">
            <div class="flex items-center justify-center gap-1.5">
                <div class="h-3 w-3 bg-blue-600 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                <div class="h-3 w-3 bg-blue-600 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="h-3 w-3 bg-blue-600 rounded-full animate-bounce"></div>
