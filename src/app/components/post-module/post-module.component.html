@if(user) {
<div class="p-4 rounded-lg flex flex-col gap-4 bg-stone-100 cursor-pointer hover:bg-stone-50 hover:shadow-md" [routerLink]="['post', id]">
    <div class="flex justify-between items-center">
        <div class="flex gap-3 items-center cursor-pointer hover:bg-white pr-2 rounded-md" [routerLink]="['/profile', userId]" title="Ver perfil">
            <div class="rounded-full p-2 bg-white">
                <img [src]="user.img" alt="imagen de usuario" width="28px">
            </div>
            <div class="flex flex-col gap-0">
                <p class="font-bold!">{{ user.name }}</p>
                <p class="text-xs text-stone-500">{{ "@" + user.username }}</p>
            </div>
        </div>

        <p><strong>{{ views }}</strong> <small> Vistas</small></p>
    </div>
    <div class="flex flex-col gap-3">
        <div>
            <h2 class="text-xl">{{ title }}</h2>
            <p>{{ body }}</p>
        </div>

        <div class="flex gap-3 text-sm text-blue-700">
            <!--ADD PIPES-->
            @for(tag of tags; track $index) {
            <p>#{{ tag | titlecase }}</p>
            }
        </div>

        <div class="flex gap-3 items-center justify-end">
            <div class="flex gap-2 items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-thumb-up">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path
                        d="M7 11v8a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1v-7a1 1 0 0 1 1 -1h3a4 4 0 0 0 4 -4v-1a2 2 0 0 1 4 0v5h3a2 2 0 0 1 2 2l-1 5a2 3 0 0 1 -2 2h-7a3 3 0 0 1 -3 -3" />
                </svg>
                <p>{{ likes }}</p>
            </div>

            <div class="flex gap-2 items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-thumb-down">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path
                        d="M7 13v-8a1 1 0 0 0 -1 -1h-2a1 1 0 0 0 -1 1v7a1 1 0 0 0 1 1h3a4 4 0 0 1 4 4v1a2 2 0 0 0 4 0v-5h3a2 2 0 0 0 2 -2l-1 -5a2 3 0 0 0 -2 -2h-7a3 3 0 0 0 -3 3" />
                </svg>
                <p>{{ dislikes }}</p>
            </div>
        </div>
    </div>
</div>
}
